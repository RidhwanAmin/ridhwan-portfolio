name: Scheduled Vercel Rebuild
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" --fail --show-error
          echo "Rebuild triggered at $(date -u)"
